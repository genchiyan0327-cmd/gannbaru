<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3言語 単語帳</title>

<style>
:root {
    --bg-color: #f5f7fa;
    --card-bg: #ffffff;
    --text-main: #333333;
    --text-sub: #666666;
    --accent: #4a90e2;
    --accent-hover: #357abd;
    --border-radius: 12px;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
    background-color: var(--bg-color);
    color: var(--text-main);
    padding-bottom: 30px;
}

header {
    background: var(--card-bg);
    padding: 15px;
    text-align: center;
    font-weight: bold;
    position: sticky;
    top: 0;
    z-index: 10;
}

.container {
    max-width: 500px;
    margin: auto;
    padding: 15px;
}

.search-box {
    width: 100%;
    padding: 12px;
    border-radius: var(--border-radius);
    border: 1px solid #ddd;
    margin-bottom: 15px;
    display: block;
}

.word-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.word-card {
    background: var(--card-bg);
    padding: 16px;
    border-radius: var(--border-radius);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.ru-text {
    font-size: 1.2rem;
    font-weight: bold;
}

.ja-sub-text {
    font-size: 0.85rem;
    color: var(--text-sub);
}

.audio-btn {
    border: none;
    background: none;
    cursor: pointer;
}

.status-msg {
    text-align: center;
    padding: 20px;
    color: var(--text-sub);
}

.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal-overlay.active {
    display: flex;
}

.modal-content {
    background: white;
    padding: 20px;
    border-radius: 16px;
    width: 90%;
    max-width: 400px;
}

.close-btn {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>ロシア語単語帳</header>

<div class="container">

<input id="searchBox" class="search-box" placeholder="検索..." />

<div id="wordList" class="word-list"></div>
</div>

<!-- モーダル -->
<div id="modal" class="modal-overlay">
<div class="modal-content">
    <h2 id="mRu"></h2>
    <p>EN: <span id="mEn"></span></p>
    <p>DE: <span id="mDe"></span></p>
    <p>JA: <span id="mJa"></span></p>

    <button class="close-btn" id="closeBtn">閉じる</button>
</div>
</div>

<script>
let wordData = [
    { "Русский": "привет", "English": "hello", "Deutsch": "hallo", "日本語": "こんにちは" },
    { "Русский": "спасибо", "English": "thanks", "Deutsch": "danke", "日本語": "ありがとう" },
    { "Русский": "да", "English": "yes", "Deutsch": "ja", "日本語": "はい" }
];

const wordListEl = document.getElementById("wordList");
const searchBox = document.getElementById("searchBox");

const modal = document.getElementById("modal");
const mRu = document.getElementById("mRu");
const mEn = document.getElementById("mEn");
const mDe = document.getElementById("mDe");
const mJa = document.getElementById("mJa");

function render(data) {
    wordListEl.innerHTML = "";

    data.forEach(item => {
        const card = document.createElement("div");
        card.className = "word-card";

        const info = document.createElement("div");
        info.innerHTML = `
            <div class="ru-text">${item["Русский"]}</div>
            <div class="ja-sub-text">${item["日本語"]}</div>
        `;

        card.onclick = () => {
            mRu.textContent = item["Русский"];
            mEn.textContent = item["English"];
            mDe.textContent = item["Deutsch"];
            mJa.textContent = item["日本語"];
            modal.classList.add("active");
        };

        card.appendChild(info);
        wordListEl.appendChild(card);
    });
}

render(wordData);

searchBox.addEventListener("input", e => {
    const q = e.target.value.toLowerCase();

    const filtered = wordData.filter(w =>
        Object.values(w).some(v =>
            v.toLowerCase().includes(q)
        )
    );

    render(filtered);
});

document.getElementById("closeBtn").onclick = () => {
    modal.classList.remove("active");
};

modal.onclick = (e) => {
    if (e.target === modal) modal.classList.remove("active");
};
</script>

</body>
</html>
